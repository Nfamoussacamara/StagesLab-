# ============================
# LabéStages — Configuration
# ============================

# Application
spring.application.name=labestages-backend
server.port=8080

# ============================
# Base de données H2 — Fichier (dev)
# Les données sont persistées dans : backend/data/labestagesdb.mv.db
# ============================
spring.datasource.url=jdbc:h2:file:./data/labestagesdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (accessible sur http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# ============================
# Swagger / OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
