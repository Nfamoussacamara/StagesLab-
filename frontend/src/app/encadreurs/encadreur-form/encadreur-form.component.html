<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card border-0 shadow-sm overflow-hidden mb-4">
      <div class="form-header d-flex align-items-center">
        <a routerLink="/encadreurs" class="text-white text-decoration-none me-3 d-flex align-items-center">
          <i class="bi bi-arrow-left fs-4"></i>
        </a>
        <h2 class="h5 mb-0 text-white fw-bold">{{ isEditMode ? 'Modifier l\'encadreur' : 'Nouvel Encadreur' }}</h2>
      </div>
      <div class="card-body p-4">
        <form [formGroup]="encadreurForm" (ngSubmit)="onSubmit()">
          <!-- Nom -->
          <div class="mb-3">
            <label for="nom" class="form-label fw-semibold">Nom complet <span class="text-danger">*</span></label>
            <input
              type="text"
              id="nom"
              class="form-control"
              placeholder="Ex: Dr. Diallo Ibrahima"
              formControlName="nom"
              [class.is-invalid]="isFieldInvalid('nom')"
            />
            <div class="invalid-feedback">
              Le nom est obligatoire.
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Ex: ibrahima@univ-labe.gn"
              formControlName="email"
              [class.is-invalid]="isFieldInvalid('email')"
            />
            <div class="invalid-feedback">
              <span *ngIf="encadreurForm.get('email')?.errors?.['required']">L'email est obligatoire.</span>
              <span *ngIf="encadreurForm.get('email')?.errors?.['email']">Format d'email invalide.</span>
            </div>
          </div>

          <!-- Specialite -->
          <div class="mb-3">
            <label for="specialite" class="form-label fw-semibold">Spécialité <span class="text-danger">*</span></label>
            <input
              type="text"
              id="specialite"
              class="form-control"
              placeholder="Ex: Intelligence Artificielle, Réseaux"
              formControlName="specialite"
              [class.is-invalid]="isFieldInvalid('specialite')"
            />
            <div class="invalid-feedback">
              La spécialité est obligatoire.
            </div>
          </div>

          <!-- Disponibilite -->
          <div class="mb-4">
            <label for="disponibilite" class="form-label fw-semibold">Disponibilité (Quota de projets) <span class="text-danger">*</span></label>
            <input
              type="number"
              id="disponibilite"
              class="form-control"
              placeholder="Ex: 3"
              formControlName="disponibilite"
              [class.is-invalid]="isFieldInvalid('disponibilite')"
            />
            <div class="invalid-feedback">
              <span *ngIf="encadreurForm.get('disponibilite')?.errors?.['required']">La disponibilité est obligatoire.</span>
              <span *ngIf="encadreurForm.get('disponibilite')?.errors?.['min']">La disponibilité doit être un nombre positif ou nul.</span>
            </div>
          </div>

          <!-- Actions -->
          <div class="d-flex justify-content-end gap-2 border-top pt-3">
            <a routerLink="/encadreurs" class="btn btn-light px-4">Annuler</a>
            <button type="submit" class="btn btn-primary px-4" [disabled]="submitting">
              <span class="spinner-border spinner-border-sm me-1" *ngIf="submitting"></span>
              Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
