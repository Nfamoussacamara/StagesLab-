<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="d-flex align-items-center mb-3">
      <a routerLink="/etudiants" class="btn btn-link text-decoration-none p-0 me-3">
        <i class="bi bi-arrow-left fs-4"></i>
      </a>
      <h1 class="h3 mb-0 text-dark fw-bold">{{ isEditMode ? 'Modifier l\'étudiant' : 'Nouvel Étudiant' }}</h1>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form [formGroup]="etudiantForm" (ngSubmit)="onSubmit()">
          <!-- Matricule -->
          <div class="mb-3">
            <label for="matricule" class="form-label fw-semibold">Matricule <span class="text-danger">*</span></label>
            <input
              type="text"
              id="matricule"
              class="form-control"
              placeholder="Ex: LIC3-2024-001"
              formControlName="matricule"
              [class.is-invalid]="isFieldInvalid('matricule')"
            />
            <div class="invalid-feedback">
              Le matricule est obligatoire.
            </div>
          </div>

          <div class="row">
            <!-- Nom -->
            <div class="col-md-6 mb-3">
              <label for="nom" class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
              <input
                type="text"
                id="nom"
                class="form-control"
                placeholder="Ex: Diallo"
                formControlName="nom"
                [class.is-invalid]="isFieldInvalid('nom')"
              />
              <div class="invalid-feedback">
                Le nom est obligatoire.
              </div>
            </div>

            <!-- Prenom -->
            <div class="col-md-6 mb-3">
              <label for="prenom" class="form-label fw-semibold">Prénom <span class="text-danger">*</span></label>
              <input
                type="text"
                id="prenom"
                class="form-control"
                placeholder="Ex: Mamadou"
                formControlName="prenom"
                [class.is-invalid]="isFieldInvalid('prenom')"
              />
              <div class="invalid-feedback">
                Le prénom est obligatoire.
              </div>
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Ex: mamadou@univ-labe.gn"
              formControlName="email"
              [class.is-invalid]="isFieldInvalid('email')"
            />
            <div class="invalid-feedback">
              <span *ngIf="etudiantForm.get('email')?.errors?.['required']">L'email est obligatoire.</span>
              <span *ngIf="etudiantForm.get('email')?.errors?.['email']">Format d'email invalide.</span>
            </div>
          </div>

          <!-- Niveau -->
          <div class="mb-4">
            <label for="niveau" class="form-label fw-semibold">Niveau <span class="text-danger">*</span></label>
            <select
              id="niveau"
              class="form-select"
              formControlName="niveau"
              [class.is-invalid]="isFieldInvalid('niveau')"
            >
              <option value="L3">Licence 3 (L3) - Par défaut</option>
              <option value="L2">Licence 2 (L2)</option>
              <option value="L1">Licence 1 (L1)</option>
            </select>
            <div class="invalid-feedback">
              Le niveau est obligatoire.
            </div>
          </div>

          <!-- Actions -->
          <div class="d-flex justify-content-end gap-2 border-top pt-3">
            <a routerLink="/etudiants" class="btn btn-light px-4">Annuler</a>
            <button type="submit" class="btn btn-primary px-4" [disabled]="submitting">
              <span class="spinner-border spinner-border-sm me-1" *ngIf="submitting"></span>
              Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
